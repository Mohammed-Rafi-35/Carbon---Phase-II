services:
  trigger-db:
    image: postgres:16
    container_name: trigger-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trigger_db
    ports:
      - "5439:5432"
    volumes:
      - trigger_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  trigger-rabbitmq:
    image: rabbitmq:3.13-management
    container_name: trigger-rabbitmq
    ports:
      - "5679:5672"
      - "15679:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  trigger-service:
    image: trigger-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trigger-service
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@trigger-db:5432/trigger_db
      RABBITMQ_URL: amqp://guest:guest@trigger-rabbitmq:5672//
      APP_ENV: development
      ENFORCE_HTTPS: "false"
      AUTO_CREATE_TABLES: "false"
      RUN_MIGRATIONS: "true"
      ENABLE_SCHEDULER: "false"
      POLL_INTERVAL_SECONDS: "300"
      PORT: "8000"
    depends_on:
      trigger-db:
        condition: service_healthy
      trigger-rabbitmq:
        condition: service_healthy
    ports:
      - "8008:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys,urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3); sys.exit(0 if r.getcode()==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  trigger_db_data:
