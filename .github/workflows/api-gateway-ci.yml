name: api-gateway-ci

on:
  push:
    paths:
      - backend/api-gateway/**
      - .github/workflows/api-gateway-ci.yml
  pull_request:
    paths:
      - backend/api-gateway/**
      - .github/workflows/api-gateway-ci.yml

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static analysis
        run: python -m compileall app tests

      - name: Run tests
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend/api-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t devtrails/api-gateway:${{ github.sha }} -t devtrails/api-gateway:latest .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deployment gate
        run: echo "Deploy stage reached. Configure registry login and deployment command for your environment."