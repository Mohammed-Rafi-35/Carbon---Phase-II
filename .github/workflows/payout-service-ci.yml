name: payout-service-ci

on:
  push:
    branches: [main]
    paths:
      - backend/services/payout-service/**
      - .github/workflows/payout-service-ci.yml
  pull_request:
    paths:
      - backend/services/payout-service/**
      - .github/workflows/payout-service-ci.yml

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/payout-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit and integration tests
        run: pytest -q

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend/services/payout-service
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t devtrails/payout-service:${{ github.sha }} -t devtrails/payout-service:latest .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Log deploy stage
        run: echo "Deploy stage reached. Configure registry login and deployment command for your environment."
