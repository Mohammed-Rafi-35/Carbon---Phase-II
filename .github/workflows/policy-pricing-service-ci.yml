name: policy-pricing-service-ci

on:
  push:
    paths:
      - backend/services/policy-pricing-service/**
      - .github/workflows/policy-pricing-service-ci.yml
  pull_request:
    paths:
      - backend/services/policy-pricing-service/**
      - .github/workflows/policy-pricing-service-ci.yml

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/policy-pricing-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t policy-pricing-service:ci .

  test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: backend/services/policy-pricing-service
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: policy_pricing_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.13
        ports:
          - 5672:5672

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/policy_pricing_db
      RABBITMQ_URL: amqp://guest:guest@localhost:5672//
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-secret
      APP_ENV: test
      GST_RATE: 0.18
      WAITING_PERIOD_HOURS: 48

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest --maxfail=1 --disable-warnings -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deployment gate
        run: echo "Deploy stage configured; integrate deployment target for staging/production environments."
